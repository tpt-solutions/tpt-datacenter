name: Bug report
description: Report a bug or unexpected behavior
labels: ["bug"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear and concise description of the bug.
      placeholder: When I run the simulator, the cooling loop reports negative airflow.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: How can we reproduce the issue?
      placeholder: |
        1. Start the edge agent in simulator mode
        2. ...
    validations:
      required: true
  - type: input
    id: component
    attributes:
      label: Component
      description: Which part of the system is affected?
      placeholder: rust-edge / ai-brain / go-telemetry / api / dashboard / topology-graph
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      description: OS, toolchain versions, build mode (simulator/real).
      placeholder: Ubuntu 24.04, Rust 1.80, cargo build --features simulator
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs / output
      render: shell
