name: Feature request
description: Suggest a new feature or enhancement
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem would this feature solve?
      validations:
        required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the feature and how it should work.
      validations:
        required: true
  - type: input
    id: component
    attributes:
      label: Component
      placeholder: rust-edge / ai-brain / go-telemetry / api / dashboard / topology-graph
      validations:
        required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any alternative approaches or designs you considered.
