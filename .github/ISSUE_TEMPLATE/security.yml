name: Security vulnerability
description: Report a security vulnerability PRIVATELY (do not use public issues)
labels: ["security"]
body:
  - type: markdown
    attributes:
      value: |
        **Do not report security vulnerabilities using public issues.**

        Please use GitHub private vulnerability reporting (Security tab →
        Report a vulnerability) or email security@tpt.example. See
        [SECURITY.md](../SECURITY.md) for details.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      validations:
        required: true
  - type: input
    id: component
    attributes:
      label: Component
      validations:
        required: true
