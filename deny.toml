# cargo-deny configuration (Phase 10 — dependency audit).
# Keep the dependency surface auditable: only permissive licenses, and fail CI
# on any advisory.

[advisories]
version = 2
yanked = "warn"
# Transitive deps from burn that cannot be upgraded without burn changing its
# own dependency tree.  Mirror the entries in .cargo/audit.toml.
ignore = [
    { id = "RUSTSEC-2025-0141", reason = "bincode 2.0.1 is a transitive dep of burn-core" },
    { id = "RUSTSEC-2024-0436", reason = "paste is a transitive dep of burn's proc-macro stack" },
    { id = "RUSTSEC-2026-0002", reason = "lru is a transitive dep of ratatui (burn-train); not reachable from our code paths" },
]

[licenses]
version = 2
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Zlib",
    "CC0-1.0",
    "MPL-2.0",
]
confidence-threshold = 0.8

[bans]
version = 2
multiple-versions = "warn"
wildcards = "warn"

[sources]
version = 2
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
