# cargo-deny configuration (Phase 10 — dependency audit).
# Keep the dependency surface auditable: only permissive licenses, and fail CI
# on any advisory.

[advisories]
version = 2
yanked = "warn"
ignore = []

[licenses]
version = 2
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Zlib",
    "CC0-1.0",
    "MPL-2.0",
]
confidence-threshold = 0.8

[bans]
version = 1
multiple-versions = "warn"
wildcards = "warn"

[sources]
version = 1
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
