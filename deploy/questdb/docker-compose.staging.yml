#
# QuestDB — staging instance.
# Single durable node with a named volume and modest resource limits.
services:
  questdb:
    image: questdb/questdb:8.1.3
    container_name: tpt-questdb-staging
    restart: unless-stopped
    ports:
      - "8812:8812"
      - "9000:9000"
      - "9009:9009"
    environment:
      QDB_PG_USER: ${QUESTDB_USER:-admin}
      QDB_PG_PASSWORD: ${QUESTDB_PASSWORD:-changeme}
    command: -f /etc/questdb/conf/questdb-staging.conf
    volumes:
      - questdb-data:/root/.questdb
      - ./conf/questdb-staging.conf:/etc/questdb/conf/questdb-staging.conf:ro
    deploy:
      resources:
        limits:
          cpus: "4.0"
          memory: 8G
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9000/status || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 20

volumes:
  questdb-data:
