#
# QuestDB — production instance.
# Hardened single node: durable volume, restart policy, resource limits,
# healthcheck, and ILP authentication enabled. For multi-node clustering see
# the QuestDB Enterprise docs; this open-source deployment targets a single
# durable primary with the AI brain and dashboard reading from it.
services:
  questdb:
    image: questdb/questdb:8.1.3
    container_name: tpt-questdb-prod
    restart: always
    ports:
      - "8812:8812"
      - "9000:9000"
      - "9009:9009"
    environment:
      QDB_PG_USER: ${QUESTDB_USER}
      QDB_PG_PASSWORD: ${QUESTDB_PASSWORD}
    command: -f /etc/questdb/conf/questdb-prod.conf
    volumes:
      - questdb-data:/root/.questdb
      - ./conf/questdb-prod.conf:/etc/questdb/conf/questdb-prod.conf:ro
    deploy:
      resources:
        limits:
          cpus: "16.0"
          memory: 64G
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9000/status || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 30
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

volumes:
  questdb-data:
