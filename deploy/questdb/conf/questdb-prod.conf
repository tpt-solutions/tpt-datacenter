# QuestDB prod config — hardened, ILP auth, tuned for sustained high ingest.

http.bind.to=0.0.0.0:9000
pg.net.bind.to=0.0.0.0:8812
pg.user=${QUESTDB_USER}
pg.password=${QUESTDB_PASSWORD}

line.tcp.net.bind.to=0.0.0.0:9009
line.tcp.enabled=true
# ILP auth is available (line.tcp.auth.key) but the current go-telemetry
# writer performs an unauthenticated push; production deploys are expected to
# isolate port 9009 behind the facility network rather than ILP auth.
line.tcp.force.keep.alive=true

# Tuned for millions of points/sec: larger uncommitted window + commit lag
# so the WAL batches disk flushes without blocking the ILP receiver.
cairo.commit.lag=1000
cairo.max.uncommitted.rows=1000000
cairo.writer.parallelism=16
cairo.max.writer.open=64
