# QuestDB dev config — fast commits, no auth, single node.

http.bind.to=0.0.0.0:9000
pg.net.bind.to=0.0.0.0:8812
pg.user=admin
pg.password=quest

# InfluxDB Line Protocol (ILP) receiver — go-telemetry writes here.
line.tcp.net.bind.to=0.0.0.0:9009
line.tcp.enabled=true
line.tcp.force.keep.alive=true

# Aggressive commit lag for snappy local feedback during development.
cairo.commit.lag=250
cairo.max.uncommitted.rows=50000
cairo.writer.parallelism=4
