# QuestDB staging config — durable, balanced commit lag.

http.bind.to=0.0.0.0:9000
pg.net.bind.to=0.0.0.0:8812
pg.user=${QUESTDB_USER:-admin}
pg.password=${QUESTDB_PASSWORD:-changeme}

line.tcp.net.bind.to=0.0.0.0:9009
line.tcp.enabled=true
line.tcp.force.keep.alive=true

cairo.commit.lag=500
cairo.max.uncommitted.rows=250000
cairo.writer.parallelism=4
